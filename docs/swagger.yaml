  github_com_vamshiganesh_arrakin_internal_api_dto.LedgerEntryListResponse:
    properties:
      items:
        items:
          $ref: '#/definitions/github_com_vamshiganesh_arrakin_internal_api_dto.LedgerEntryResponse'
        type: array
      page:
        $ref: '#/definitions/github_com_vamshiganesh_arrakin_internal_api_dto.PageMeta'
    type: object
  github_com_vamshiganesh_arrakin_internal_api_dto.LedgerEntryResponse:
    properties:
      account_id:
