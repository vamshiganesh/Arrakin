host: localhost:8080
info:
  contact: {}
  description: Settlement, ledger, and payout engine HTTP API
  title: Arrakin API
  version: "1.0"
paths:
  /admin/scheduler/tick:
    post:
      parameters:
      - description: Idempotency key
        in: header
        name: Idempotency-Key
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_vamshiganesh_arrakin_internal_api_dto.SchedulerTickResponse'
      summary: Manually trigger scheduler maturity scan
      tags:
      - admin
  /audit/events:
    get:
      parameters:
      - description: Entity type filter
        in: query
        name: entity_type
        type: string
      - description: Entity UUID filter
        in: query
        name: entity_id
        type: string
      - description: Action filter
        in: query
        name: action
        type: string
      - description: Page size
        in: query
        name: limit
        type: integer
      - description: Pagination cursor
        in: query
        name: cursor
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_vamshiganesh_arrakin_internal_api_dto.AuditEventListResponse'
      summary: List audit events
      tags:
      - audit
  /ledger/accounts:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_vamshiganesh_arrakin_internal_api_dto.LedgerAccountListResponse'
      summary: List ledger accounts
      tags:
      - ledger
  /ledger/entries:
    get:
      parameters:
      - description: Settlement job UUID
        in: query
        name: settlement_job_id
        type: string
      - description: Ledger account code
        in: query
        name: account_code
        type: string
      - description: Posted at from (RFC3339)
        in: query
        name: from
        type: string
      - description: Posted at to (RFC3339)
        in: query
        name: to
        type: string
      - description: Page size
        in: query
        name: limit
        type: integer
      - description: Pagination cursor
        in: query
        name: cursor
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_vamshiganesh_arrakin_internal_api_dto.LedgerEntryListResponse'
      summary: List ledger entries
      tags:
      - ledger
  /reconciliation/latest:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_vamshiganesh_arrakin_internal_api_dto.ReconciliationResponse'
      summary: Get latest reconciliation snapshot
      tags:
      - reconciliation
  /reconciliation/run:
    post:
      parameters:
      - description: Idempotency key
        in: header
        name: Idempotency-Key
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_vamshiganesh_arrakin_internal_api_dto.ReconciliationResponse'
      summary: Run reconciliation snapshot now
      tags:
      - reconciliation
  /reconciliation/snapshots:
    get:
      parameters:
      - description: Page size
        in: query
        name: limit
        type: integer
      - description: Pagination cursor
        in: query
        name: cursor
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_vamshiganesh_arrakin_internal_api_dto.ReconciliationListResponse'
      summary: List reconciliation snapshots
      tags:
      - reconciliation
  /settlement-jobs:
    get:
      parameters:
      - description: Job status filter
        in: query
        name: status
        type: string
      - description: Investment UUID filter
        in: query
        name: investment_id
        type: string
      - description: Page size (max 200)
        in: query
        name: limit
        type: integer
      - description: Pagination cursor
        in: query
        name: cursor
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_vamshiganesh_arrakin_internal_api_dto.SettlementJobListResponse'
      summary: List settlement jobs
      tags:
      - settlement-jobs
  /settlement-jobs/{id}:
    get:
      parameters:
      - description: Job UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_vamshiganesh_arrakin_internal_api_dto.SettlementJobResponse'
      summary: Get settlement job by ID
      tags:
      - settlement-jobs
  /settlement-jobs/{id}/attempts:
    get:
      parameters:
      - description: Job UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_vamshiganesh_arrakin_internal_api_dto.PayoutAttemptListResponse'
      summary: List payout attempts for a job
      tags:
      - settlement-jobs
  /settlement-jobs/{id}/replay:
    post:
      parameters:
      - description: Job UUID
        in: path
        name: id
        required: true
        type: string
      - description: Idempotency key
        in: header
        name: Idempotency-Key
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_vamshiganesh_arrakin_internal_api_dto.JobActionResponse'
      summary: Replay a dead-letter settlement job
      tags:
      - settlement-jobs
  /settlement-jobs/{id}/requeue:
    post:
      parameters:
      - description: Job UUID
        in: path
        name: id
        required: true
        type: string
      - description: Idempotency key
        in: header
        name: Idempotency-Key
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_vamshiganesh_arrakin_internal_api_dto.JobActionResponse'
      summary: Requeue a failed settlement job for immediate retry
      tags:
      - settlement-jobs
securityDefinitions:
  ApiKeyAuth:
    in: header
    name: X-API-Key
    type: apiKey
swagger: "2.0"
