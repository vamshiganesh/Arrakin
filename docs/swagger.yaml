        type: array
      page:
        $ref: '#/definitions/github_com_vamshiganesh_arrakin_internal_api_dto.PageMeta'
    type: object
  github_com_vamshiganesh_arrakin_internal_api_dto.AuditEventResponse:
    properties:
      action:
        type: string
      actor_id:
