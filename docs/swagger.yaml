      payout_reference:
        type: string
      settlement_job_id:
        type: string
      started_at:
        type: string
      status:
        type: string
    type: object
  github_com_vamshiganesh_arrakin_internal_api_dto.ReconciliationListResponse:
    properties:
      items:
        items:
          $ref: '#/definitions/github_com_vamshiganesh_arrakin_internal_api_dto.ReconciliationResponse'
        type: array
      page:
        $ref: '#/definitions/github_com_vamshiganesh_arrakin_internal_api_dto.PageMeta'
