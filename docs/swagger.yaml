  github_com_vamshiganesh_arrakin_internal_api_dto.PayoutAttemptListResponse:
    properties:
      items:
        items:
          $ref: '#/definitions/github_com_vamshiganesh_arrakin_internal_api_dto.PayoutAttemptResponse'
