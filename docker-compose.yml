services:
  postgres:
    image: postgres:16-alpine
    container_name: arrakin-postgres
    environment:
      POSTGRES_USER: arrakin
      POSTGRES_PASSWORD: arrakin
      POSTGRES_DB: arrakin
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arrakin -d arrakin"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: arrakin-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

volumes:
  postgres_data:
